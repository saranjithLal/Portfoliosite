<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saranjith Lal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b1a2b, #162d4a);
    color: white;
}

/* Center Content */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Title */
h1 {
    margin-bottom: 10px;
}

/* Button */
.open-btn {
    margin-top: 20px;
    padding: 14px 28px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.open-btn:hover {
    transform: scale(1.05);
    background: #43a047;
}

/* Floating Buttons */
.floating-buttons {
    position: fixed;
    right: 3vw;
    bottom: 3vh;
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 1000;
}

/* Button Style */
.btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    text-decoration: none;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
    animation: floatUp 0.6s ease forwards;
}

/* Colors */
.linkedin { background: #0077b5; }
.call { background: #28a745; }
.download { background: #ff9800; }

/* Hover Animation */
.btn:hover {
    transform: scale(1.15);
}

/* Entrance Animation */
@keyframes floatUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Stagger effect */
.btn:nth-child(1) { animation-delay: 0.2s; }
.btn:nth-child(2) { animation-delay: 0.4s; }
.btn:nth-child(3) { animation-delay: 0.6s; }

/* Mobile Adjust */
@media (max-width: 600px) {
    .btn {
        width: 50px;
        height: 50px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Saranjith Lal</h1>
    <p> Graphic Designer </p>

    <button class="open-btn" onclick="openPDF()">
        View Resume
    </button>
</div>

<!-- Floating Icons -->
<div class="floating-buttons">
    <a class="btn linkedin" href="https://www.linkedin.com/in/saranjith-lal-22821614b/" target="_blank">
        <i class="fab fa-linkedin-in"></i>
    </a>

    <a class="btn call" href="tel:+917907978994">
        <i class="fas fa-phone"></i>
    </a>

    <a class="btn download" href="./Resume260426.pdf" download>
        <i class="fas fa-download"></i>
    </a>
</div>

<script>
function openPDF() {
    window.open("./Resume260426.pdf", "_blank");
}
</script>

</body>
</html>
