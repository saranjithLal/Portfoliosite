<!DOCTYPE html>
<html>
<head>
    <title>Saranjith Lal</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }

        /* Floating Buttons Container */
        .floating-buttons {
            position: fixed;
            right: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        /* Button Style */
        .btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .linkedin { background: #0077b5; }
        .call { background: #28a745; }
        .download { background: #ff9800; }

        .btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <!-- PDF Full Screen -->
    <iframe src="resume.pdf"></iframe>

    <!-- Floating Buttons -->
    <div class="floating-buttons">

        <a class="btn linkedin" href="https://www.linkedin.com/in/saranjith-lal-22821614b/" target="_blank">
            <i class="fab fa-linkedin-in"></i>
        </a>

        <a class="btn call" href="tel:+917907978994">
            <i class="fas fa-phone"></i>
        </a>

        <a class="btn download" href="resume.pdf" download>
            <i class="fas fa-download"></i>
        </a>

    </div>

</body>
</html>
