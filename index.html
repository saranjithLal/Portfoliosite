<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saranjith Lal</title>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0b1a2b;
      overflow: hidden;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }

    /* Floating Buttons */
    .floating-buttons {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 1000;
    }

    .btn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
      text-decoration: none;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.12);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    .linkedin { background: #0077b5; }
    .call { background: #28a745; }
    .download { background: #ff9800; }

    /* Mobile Fix */
    @media (max-width: 600px) {
      .btn {
        width: 50px;
        height: 50px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- PDF Viewer -->
  <iframe src="./resume.pdf#toolbar=0"></iframe>

  <!-- Floating Action Buttons -->
  <div class="floating-buttons">
    <a class="btn linkedin" href="https://www.linkedin.com/in/saranjith-lal-22821614b/" target="_blank">
      <i class="fab fa-linkedin-in"></i>
    </a>

    <a class="btn call" href="tel:+917907978994">
      <i class="fas fa-phone"></i>
    </a>

    <a class="btn download" href="./resume.pdf" download>
      <i class="fas fa-download"></i>
    </a>
  </div>

</body>
</html>
